# Pipeline CI/CD - GitHub Actions
# Executa os testes automaticamente a cada push/PR

name: Testes Automatizados

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 1-5'  # Roda todo dia útil às 2h da manhã
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # JOB 1: Testes Web - Amazon
  testes-web-amazon:
    name: Testes Web - Amazon
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Setup Environment and Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          rfbrowser init

      - name: Run Amazon Tests
        run: robot -v ENVIRONMENT:AMAZON -d results/amazon tests/web/
      
      - name: Upload dos resultados (Amazon)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultados-amazon
          path: results/amazon/
          retention-days: 30

  # JOB 2: Testes Web - Mercado Livre
  testes-web-mercadolivre:
    name: Testes Web - Mercado Livre
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Setup Environment and Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          rfbrowser init

      - name: Run Mercado Livre Tests
        run: robot -v ENVIRONMENT:MERCADOLIVRE -d results/mercadolivre tests/web/
      
      - name: Upload dos resultados (Mercado Livre)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultados-mercadolivre
          path: results/mercadolivre/
          retention-days: 30

  # JOB 3: Testes Web - Casas Bahia
  testes-web-casasbahia:
    name: Testes Web - Casas Bahia
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Environment and Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          rfbrowser init

      - name: Run Casas Bahia Tests (Headless expected failure)
        run: robot -v ENVIRONMENT:CASASBAHIA -d results/casasbahia tests/web/
        continue-on-error: true

      - name: Upload dos resultados (Casas Bahia)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultados-casasbahia
          path: results/casasbahia/
          retention-days: 30
      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          rfbrowser init # Inicializa o Playwright para os testes web
...
  # JOB 4: Consolidação de Resultados
  consolidar-resultados:
    name: Consolidar Resultados
    needs: [testes-web-amazon, testes-web-mercadolivre, testes-web-casasbahia]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Download resultados Amazon
        uses: actions/download-artifact@v4
        with:
          name: resultados-amazon
          path: consolidado/amazon
      
      - name: Download resultados Mercado Livre
        uses: actions/download-artifact@v4
        with:
          name: resultados-mercadolivre
          path: consolidado/mercadolivre

      - name: Download resultados Casas Bahia
        uses: actions/download-artifact@v4
        with:
          name: resultados-casasbahia
          path: consolidado/casasbahia