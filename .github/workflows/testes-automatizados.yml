# Pipeline CI/CD - GitHub Actions
# Executa os testes automaticamente a cada push/PR

name: Testes Automatizados

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 1-5'  # Roda todo dia útil às 2h da manhã
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # JOB 1: Testes Web - Amazon
  testes-web-amazon:
    name: Testes Web - Amazon
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install robotframework
          pip install robotframework-browser
          pip install robotframework-appiumlibrary
      
      - name: Inicializar Playwright
        run: rfbrowser init
      
      - name: Executar testes no ambiente AMAZON
        run: |
          robot --variable ENVIRONMENT:AMAZON \
                --outputdir results/amazon \
                --name "Testes Amazon" \
                --loglevel INFO \
                tests/web/
        continue-on-error: true
      
      - name: Upload dos resultados (Amazon)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultados-amazon
          path: results/amazon/
          retention-days: 30

  # JOB 2: Testes Web - Mercado Livre
  testes-web-mercadolivre:
    name: Testes Web - Mercado Livre
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install robotframework robotframework-browser robotframework-appiumlibrary
      
      - name: Inicializar Playwright
        run: rfbrowser init
      
      - name: Executar testes no ambiente MERCADOLIVRE
        run: |
          robot --variable ENVIRONMENT:MERCADOLIVRE \
                --outputdir results/mercadolivre \
                --name "Testes Mercado Livre" \
                --loglevel INFO \
                tests/web/
        continue-on-error: true
      
      - name: Upload dos resultados (Mercado Livre)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultados-mercadolivre
          path: results/mercadolivre/
          retention-days: 30

  # JOB 3: Testes Web - Casas Bahia
  testes-web-casasbahia:
    name: Testes Web - Casas Bahia
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install robotframework robotframework-browser robotframework-appiumlibrary
      
      - name: Inicializar Playwright
        run: rfbrowser init
      
      - name: Executar testes no ambiente CASASBAHIA
        run: |
          robot --variable ENVIRONMENT:CASASBAHIA \
                --outputdir results/casasbahia \
                --name "Testes Casas Bahia" \
                --loglevel INFO \
                tests/web/
        continue-on-error: true
      
      - name: Upload dos resultados (Casas Bahia)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultados-casasbahia
          path: results/casasbahia/
          retention-days: 30

  # JOB 4: Consolidação de Resultados
  consolidar-resultados:
    name: Consolidar Resultados
    needs: [testes-web-amazon, testes-web-mercadolivre, testes-web-casasbahia]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Download resultados Amazon
        uses: actions/download-artifact@v4
        with:
          name: resultados-amazon
          path: consolidado/amazon
      
      - name: Download resultados Mercado Livre
        uses: actions/download-artifact@v4
        with:
          name: resultados-mercadolivre
          path: consolidado/mercadolivre
      
      - name: Download resultados Casas Bahia
        uses: actions/download-artifact@v4
        with:
          name: resultados-casasbahia
          path: consolidado/casasbahia
      
      - name: Gerar relatório consolidado
        run: |
          echo "## Resumo da Execução" > resumo.md
          echo "" >> resumo.md
          echo "Testes executados em 3 ambientes simultaneamente" >> resumo.md
          echo "" >> resumo.md
          echo "### Ambientes testados:" >> resumo.md
          echo "- Amazon" >> resumo.md
          echo "- Mercado Livre" >> resumo.md
          echo "- Casas Bahia" >> resumo.md
          echo "" >> resumo.md
          echo "Acesse os artefatos acima para ver os relatórios detalhados" >> resumo.md
          cat resumo.md
      
      - name: Comentar no PR (se houver)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resumo = fs.readFileSync('resumo.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: resumo
            });
